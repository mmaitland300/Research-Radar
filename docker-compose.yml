version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: research-radar-postgres
    environment:
      POSTGRES_DB: research_radar
      POSTGRES_USER: research_radar
      POSTGRES_PASSWORD: research_radar
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  postgres-data:

