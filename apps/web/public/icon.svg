<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="Research Radar icon">
  <title>Research Radar</title>
  <!-- Transparent square canvas; icon is optimized for 16x16 and 32x32 rasterization -->
  <circle cx="128" cy="128" r="116" fill="#0B1F3B"/>

  <!-- Radar sweep: wide sector from the monogram center toward the upper-right perimeter -->
  <path fill="#FFFFFF" d="M128 112 L163.85 17.68 A116 116 0 0 1 219.83 57.71 Z"/>

  <!-- RR monogram: two R forms sharing a center stem, simplified for favicon scale -->
  <g fill="#FFFFFF">
    <!-- top shoulder spanning both letters -->
    <rect x="44" y="90" width="168" height="70" rx="35" ry="35"/>
    <!-- shared stem -->
    <rect x="110" y="90" width="36" height="112"/>
    <!-- left diagonal leg -->
    <path d="M86 152 H104 L73 210 H42 Z"/>
    <!-- right diagonal leg -->
    <path d="M152 152 H170 L214 210 H183 Z"/>
  </g>

  <!-- Open counters for each R -->
  <g fill="#0B1F3B">
    <rect x="68" y="112" width="42" height="25" rx="12.5" ry="12.5"/>
    <rect x="146" y="112" width="42" height="25" rx="12.5" ry="12.5"/>
  </g>
</svg>
