<svg
  xmlns="http://www.w3.org/2000/svg"
  width="256"
  height="256"
  viewBox="0 0 256 256"
  role="img"
  aria-label="Research Radar icon"
>
  <!-- square canvas -->
  <rect width="256" height="256" fill="#FFFFFF"/>

  <!-- navy disk -->
  <circle cx="128" cy="128" r="116" fill="#0B1F3B"/>

  <!-- RR monogram -->
  <g fill="#FFFFFF">
    <!-- top merged shoulder -->
    <rect x="46" y="96" width="164" height="66" rx="33"/>

    <!-- shared center stem -->
    <rect x="110" y="96" width="36" height="110"/>

    <!-- left leg -->
    <path d="M80 152H108L70 206H36Z"/>

    <!-- right leg -->
    <path d="M148 152H176L220 206H186Z"/>
  </g>

  <!-- open counters -->
  <g fill="#0B1F3B">
    <rect x="67" y="114" width="43" height="26" rx="13"/>
    <rect x="146" y="114" width="43" height="26" rx="13"/>
  </g>

  <!-- radar sweep sector -->
  <path
    d="M128 112
       L160 16
       A116 116 0 0 1 219 57
       Z"
    fill="#FFFFFF"
  />
</svg>
