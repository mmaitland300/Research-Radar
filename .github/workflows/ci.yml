name: CI

on:
  push:
  pull_request:

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python packages and test runner
        run: |
          python -m pip install --upgrade pip
          pip install -e ./services/pipeline
          pip install -e ./apps/api
          pip install pytest httpx

      - name: Run Python unit tests
        run: pytest services/pipeline/tests apps/api/tests -q

  web-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install web dependencies
        run: npm install

      - name: Lint web app
        run: npm run lint:web

      - name: Build web app
        run: npm run build:web
